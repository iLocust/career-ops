<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>career-ops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b0d;
      --surface: #141418;
      --surface-2: #1c1c22;
      --border: #23232b;
      --border-strong: #2f2f38;
      --accent: #a78bfa;
      --accent-dim: rgba(167, 139, 250, 0.12);
      --text: #e6e6ea;
      --text-dim: #9a9aa8;
      --muted: #6a6a78;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;

      --font-sans: 'IBM Plex Sans', -apple-system, system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', 'SF Mono', monospace;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ---------- Header ---------- */
    header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .logo {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.2px;
    }
    .logo .dim { color: var(--muted); }
    .tag {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      padding: 2px 7px;
      border: 1px solid var(--border);
      border-radius: 3px;
    }
    .health {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }
    .dot.ok { background: var(--green); box-shadow: 0 0 8px rgba(74, 222, 128, 0.4); }
    .dot.warn { background: var(--yellow); }

    /* ---------- Layout ---------- */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: 0;
      min-width: 0;
    }

    .panel {
      padding: 18px 20px;
      overflow: hidden;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: 100%;
      min-height: 0;
    }

    .panel .fields-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }

    .panel .mode-fields {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }

    .field.grow {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .field.grow textarea {
      flex: 1;
      min-height: 0;
      resize: none;
    }

    /* ---------- Form primitives ---------- */
    .field { margin: 0; }
    .field:last-child { margin: 0; }

    label, .label {
      display: block;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input[type="text"], textarea, select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.12s, background 0.12s;
    }
    input[type="text"]:hover, textarea:hover, select:hover { border-color: var(--border-strong); }
    input[type="text"]:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      background: var(--surface-2);
    }
    textarea {
      resize: vertical;
      min-height: 60px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.55;
    }
    #nc-cv, #ec-cv { min-height: 140px; resize: vertical; }

    select {
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%236a6a78' stroke-width='1.3' fill='none' stroke-linecap='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 10px center;
      padding-right: 26px;
      cursor: pointer;
    }

    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; min-width: 0; }

    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .label-row label, .label-row .label { margin: 0; }

    /* ---------- Buttons ---------- */
    button {
      font-family: var(--font-sans);
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
    }
    button:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) {
      border-color: var(--border-strong);
      color: var(--text);
      background: var(--surface-2);
    }
    .btn.ghost { background: transparent; }
    .btn.icon { padding: 6px 9px; font-size: 11px; }
    .btn.danger:hover:not(:disabled) { border-color: var(--red); color: var(--red); }

    .btn-upload {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      background: none;
      border: 1px dashed var(--border-strong);
      border-radius: 4px;
      padding: 2px 8px;
      transition: all 0.12s;
      letter-spacing: 0.3px;
    }
    .btn-upload:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); border-style: solid; }
    .btn-upload.loading { opacity: 0.4; pointer-events: none; }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #0b0b0d;
      border: none;
      border-radius: 5px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2px;
      transition: all 0.12s;
    }
    .btn-primary:hover:not(:disabled) { background: #b79dfc; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .client-bar {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }
    .client-bar select { flex: 1; min-width: 0; }
    .client-bar .btn { padding: 7px 10px; font-size: 11px; }

    /* ---------- Mode tabs (segmented) ---------- */
    .segmented {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px;
      gap: 2px;
    }
    .segmented button {
      flex: 1;
      padding: 6px 0;
      background: transparent;
      color: var(--text-dim);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .segmented button:hover { color: var(--text); }
    .segmented button.active {
      background: var(--surface-2);
      color: var(--text);
      box-shadow: inset 0 0 0 1px var(--border-strong);
    }

    /* ---------- Run button area ---------- */
    .run-row { flex-shrink: 0; }

    /* ---------- Modal ---------- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 22px;
      width: min(520px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
    }
    .modal h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: -0.2px;
    }
    .modal .field { margin-bottom: 12px; }
    .modal .actions {
      display: flex;
      gap: 8px;
      margin-top: 18px;
      justify-content: flex-end;
    }

    /* ---------- Output panel ---------- */
    .output-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
    }
    .output-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .output-header .label { margin: 0; }

    .pill {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 3px;
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      letter-spacing: 0.3px;
    }
    .pill.running {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: transparent;
    }
    .pill.running::before {
      content: '';
      display: inline-block;
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
      animation: blink 1s infinite;
    }
    .pill.done { color: var(--green); border-color: rgba(74, 222, 128, 0.25); background: rgba(74, 222, 128, 0.08); }
    .pill.error { color: var(--red); border-color: rgba(248, 113, 113, 0.25); background: rgba(248, 113, 113, 0.08); }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .output-header .spacer { flex: 1; }

    .output-body {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      font-size: 13.5px;
      line-height: 1.7;
      min-width: 0;
    }
    #output .placeholder {
      color: var(--muted);
      font-style: italic;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    /* Markdown rendering */
    #output h1, #output h2, #output h3 {
      color: var(--text);
      font-weight: 600;
      margin: 1.4em 0 0.5em;
      letter-spacing: -0.2px;
    }
    #output h1 { font-size: 18px; }
    #output h2 { font-size: 15px; color: var(--accent); }
    #output h3 { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; font-family: var(--font-mono); }
    #output h1:first-child, #output h2:first-child, #output h3:first-child { margin-top: 0; }
    #output strong { color: var(--text); font-weight: 600; }
    #output code {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 11.5px;
    }
    #output table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
      font-size: 12.5px;
      table-layout: fixed;
    }
    #output th, #output td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
      word-break: break-word;
    }
    #output th {
      background: var(--surface);
      color: var(--text-dim);
      font-weight: 500;
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    #output tr:nth-child(even) td { background: rgba(255, 255, 255, 0.015); }
    #output hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }

    /* ---------- Reports sidebar ---------- */
    .reports-panel {
      width: 220px;
      min-width: 220px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      padding: 16px 14px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .reports-panel.hidden { display: none; }
    .reports-panel .label { margin-bottom: 0; }

    .reports-list { display: flex; flex-direction: column; gap: 4px; }

    .report-item-row { display: flex; gap: 4px; }
    .report-item {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid transparent;
      border-radius: 5px;
      background: transparent;
      text-align: left;
      transition: all 0.12s;
      min-width: 0;
    }
    .report-item:hover { background: var(--surface); }
    .report-item.active {
      background: var(--accent-dim);
      border-color: rgba(167, 139, 250, 0.3);
    }
    .report-name {
      font-size: 11.5px;
      color: var(--text);
      line-height: 1.35;
      word-break: break-word;
      text-transform: capitalize;
    }
    .report-item.active .report-name { color: var(--text); }
    .report-meta {
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.3px;
    }
    .report-item.active .report-meta { color: var(--accent); }

    .pdf-btn {
      flex-shrink: 0;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 9.5px;
      transition: all 0.12s;
    }
    .pdf-btn:hover:not(.loading) { border-color: var(--accent); color: var(--accent); }
    .pdf-btn.loading { opacity: 0.4; pointer-events: none; }

    .no-reports {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--muted);
      padding: 8px 2px;
    }

    /* ---------- Scrollbar ---------- */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

    /* ---------- Responsive ---------- */
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .panel { border-right: none; border-bottom: 1px solid var(--border); max-height: 50vh; }
      .reports-panel { width: 180px; min-width: 180px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">career<span class="dim">·</span>ops</div>
  <div class="tag">local</div>
  <div class="health">
    <span id="client-count">0 clients</span>
    <div class="dot ok" id="health-dot"></div>
  </div>
</header>

<main>
  <!-- Left panel -->
  <div class="panel">
    <div class="field">
      <label>Client</label>
      <div class="client-bar">
        <select id="client-select"><option value="">Ad-hoc (no client)</option></select>
        <button class="btn" id="new-client-btn" type="button" title="New client">+</button>
        <button class="btn" id="edit-client-btn" type="button" disabled title="Edit">✎</button>
        <button class="btn danger" id="delete-client-btn" type="button" disabled title="Delete">×</button>
      </div>
    </div>

    <div class="field">
      <label>Mode</label>
      <div class="segmented">
        <button class="active" data-mode="evaluate" type="button">Evaluate</button>
        <button data-mode="compare" type="button">Compare</button>
        <button data-mode="interview" type="button">Interview</button>
      </div>
    </div>

    <div class="fields-wrap">
      <!-- Evaluate -->
      <div id="fields-evaluate" class="mode-fields" style="display:flex">
        <div class="field">
          <div class="label-row">
            <label>Candidate CV</label>
            <button class="btn-upload" type="button" onclick="triggerPdfUpload('cv-input', this)">upload pdf</button>
          </div>
          <textarea id="cv-input" placeholder="Paste CV, or pick a client above…"></textarea>
        </div>

        <div class="field">
          <label>Company <span style="color:var(--muted);text-transform:none;letter-spacing:0">— optional, names the report</span></label>
          <input type="text" id="company-eval" placeholder="e.g. Stripe">
        </div>

        <div class="field grow">
          <label>Job Description or URL</label>
          <textarea id="jd-input" placeholder="Paste JD text, or a URL…"></textarea>
        </div>
      </div>

      <!-- Compare -->
      <div id="fields-compare" class="mode-fields" style="display:none">
        <div class="field">
          <div class="label-row">
            <label>Your CV</label>
            <button class="btn-upload" type="button" onclick="triggerPdfUpload('cv-compare', this)">upload pdf</button>
          </div>
          <textarea id="cv-compare" placeholder="Paste your CV…"></textarea>
        </div>

        <div class="field grow">
          <label>Job Descriptions <span style="color:var(--muted);text-transform:none;letter-spacing:0">— separate with <code style="font-family:var(--font-mono);background:var(--surface);padding:1px 5px;border-radius:3px">---</code></span></label>
          <textarea id="jds-compare" placeholder="--- JD 1 ---
Paste first JD…

--- JD 2 ---
Paste second JD…"></textarea>
        </div>
      </div>

      <!-- Interview -->
      <div id="fields-interview" class="mode-fields" style="display:none">
        <div class="field">
          <div class="label-row">
            <label>Your CV</label>
            <button class="btn-upload" type="button" onclick="triggerPdfUpload('cv-interview', this)">upload pdf</button>
          </div>
          <textarea id="cv-interview" placeholder="Paste your CV…"></textarea>
        </div>

        <div class="field">
          <div class="row">
            <div>
              <label>Company</label>
              <input type="text" id="company-input" placeholder="e.g. Stripe">
            </div>
            <div>
              <label>Role</label>
              <input type="text" id="role-input" placeholder="e.g. Senior PM">
            </div>
          </div>
        </div>

        <div class="field grow">
          <label>Job Description <span style="color:var(--muted);text-transform:none;letter-spacing:0">— optional</span></label>
          <textarea id="jd-interview" placeholder="Paste JD for better accuracy…"></textarea>
        </div>
      </div>
    </div>

    <div class="run-row">
      <button class="btn-primary" id="run-btn">Run →</button>
    </div>
  </div>

  <!-- New Client modal -->
  <div class="modal-backdrop" id="new-client-modal">
    <div class="modal">
      <h2>New Client</h2>
      <div class="field">
        <label>Name</label>
        <input type="text" id="nc-name" placeholder="e.g. Budi Surya">
      </div>
      <div class="field">
        <div class="label-row">
          <label>CV</label>
          <button class="btn-upload" type="button" onclick="triggerPdfUpload('nc-cv', this)">upload pdf</button>
        </div>
        <textarea id="nc-cv" placeholder="Paste client's CV…"></textarea>
      </div>
      <div class="field">
        <label>Profile notes <span style="color:var(--muted);text-transform:none;letter-spacing:0">— optional</span></label>
        <textarea id="nc-profile" style="min-height:80px" placeholder="Archetype, deal-breakers, salary target…"></textarea>
      </div>
      <div class="actions">
        <button type="button" class="btn" id="nc-cancel">Cancel</button>
        <button type="button" class="btn-primary" style="width:auto;padding:8px 18px" id="nc-save">Create</button>
      </div>
    </div>
  </div>

  <!-- Edit Client modal -->
  <div class="modal-backdrop" id="edit-client-modal">
    <div class="modal">
      <h2>Edit Client</h2>
      <div class="field">
        <div class="label-row">
          <label>CV</label>
          <button class="btn-upload" type="button" onclick="triggerPdfUpload('ec-cv', this)">upload pdf</button>
        </div>
        <textarea id="ec-cv" placeholder="CV content…"></textarea>
      </div>
      <div class="field">
        <label>Profile notes</label>
        <textarea id="ec-profile" style="min-height:80px" placeholder="Archetype, deal-breakers, salary target…"></textarea>
      </div>
      <div class="actions">
        <button type="button" class="btn" id="ec-cancel">Cancel</button>
        <button type="button" class="btn-primary" style="width:auto;padding:8px 18px" id="ec-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Output -->
  <div class="output-panel">
    <div class="output-header">
      <span class="label">Output</span>
      <span class="pill" id="status-pill">idle</span>
      <div class="spacer"></div>
      <button class="btn ghost icon" id="toggle-reports-btn" title="Toggle reports">Reports</button>
      <button class="btn ghost icon" id="export-pdf-btn" style="display:none" title="Export current report as PDF">PDF</button>
      <button class="btn ghost icon" id="copy-btn">Copy</button>
    </div>
    <div class="output-body">
      <div id="output">
        <span class="placeholder">Results will appear here. Fill in the form and click Run →</span>
      </div>
      <aside class="reports-panel hidden" id="reports-panel">
        <div class="label">Reports</div>
        <div class="reports-list" id="reports-list"><span class="no-reports">Select a client</span></div>
      </aside>
    </div>
  </div>
</main>

<script>
  // ---------- PDF upload ----------
  const _pdfInput = document.createElement('input');
  _pdfInput.type = 'file';
  _pdfInput.accept = 'application/pdf';
  _pdfInput.style.display = 'none';
  document.body.appendChild(_pdfInput);

  let _pdfTarget = null;
  let _pdfBtn = null;

  function triggerPdfUpload(textareaId, btn) {
    _pdfTarget = textareaId;
    _pdfBtn = btn;
    _pdfInput.value = '';
    _pdfInput.click();
  }

  _pdfInput.addEventListener('change', async () => {
    const file = _pdfInput.files[0];
    if (!file || !_pdfTarget) return;
    _pdfBtn.textContent = 'parsing…';
    _pdfBtn.classList.add('loading');
    try {
      const fd = new FormData();
      fd.append('pdf', file);
      const res = await fetch('/api/parse-pdf', { method: 'POST', body: fd });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || 'parse error');
      document.getElementById(_pdfTarget).value = json.text.trim();
      _pdfBtn.textContent = '✓ loaded';
      setTimeout(() => { _pdfBtn.textContent = 'upload pdf'; }, 2000);
    } catch (e) {
      alert('PDF parse failed: ' + e.message);
      _pdfBtn.textContent = 'upload pdf';
    }
    _pdfBtn.classList.remove('loading');
  });

  // ---------- Client management ----------
  const clientSelect = document.getElementById('client-select');
  const clientCountLabel = document.getElementById('client-count');
  let currentClient = null;

  async function loadClients(selectSlug = null) {
    const list = await fetch('/api/clients').then(r => r.json()).catch(() => []);
    clientSelect.innerHTML = '<option value="">Ad-hoc (no client)</option>'
      + list.map(c => `<option value="${c.slug}">${c.name}</option>`).join('');
    clientCountLabel.textContent = list.length + ' client' + (list.length === 1 ? '' : 's');
    if (selectSlug) clientSelect.value = selectSlug;
    await onClientChange();
  }

  const editBtn = document.getElementById('edit-client-btn');
  const deleteBtn = document.getElementById('delete-client-btn');

  async function onClientChange() {
    const slug = clientSelect.value;
    const hasClient = !!slug;
    editBtn.disabled = !hasClient;
    deleteBtn.disabled = !hasClient;
    loadReports(slug);
    if (!slug) { currentClient = null; return; }
    currentClient = await fetch('/api/clients/' + slug).then(r => r.json());
    if (currentClient && currentClient.cv) {
      document.getElementById('cv-input').value = currentClient.cv;
      document.getElementById('cv-compare').value = currentClient.cv;
      document.getElementById('cv-interview').value = currentClient.cv;
    }
  }

  clientSelect.addEventListener('change', onClientChange);

  // Edit client
  const ecModal = document.getElementById('edit-client-modal');
  editBtn.addEventListener('click', () => {
    if (!currentClient) return;
    document.getElementById('ec-cv').value = currentClient.cv || '';
    document.getElementById('ec-profile').value = currentClient.profile || '';
    ecModal.classList.add('open');
  });
  document.getElementById('ec-cancel').addEventListener('click', () => ecModal.classList.remove('open'));
  ecModal.addEventListener('click', (e) => { if (e.target === ecModal) ecModal.classList.remove('open'); });
  document.getElementById('ec-save').addEventListener('click', async () => {
    if (!currentClient) return;
    const cv = document.getElementById('ec-cv').value;
    const profile = document.getElementById('ec-profile').value;
    const res = await fetch('/api/clients/' + currentClient.slug, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cv, profile }),
    });
    if (!res.ok) { alert('Failed to save.'); return; }
    ecModal.classList.remove('open');
    await loadClients(currentClient.slug);
  });

  // ---------- Reports ----------
  const reportsList = document.getElementById('reports-list');
  const reportsPanel = document.getElementById('reports-panel');
  const toggleReportsBtn = document.getElementById('toggle-reports-btn');
  const exportPdfBtn = document.getElementById('export-pdf-btn');
  let activeReportFile = null;

  async function downloadReportPdf(slug, filename, btn) {
    const original = btn.textContent;
    btn.textContent = '…';
    btn.classList.add('loading');
    try {
      const res = await fetch(`/api/clients/${slug}/reports/${filename}/pdf`, { method: 'POST' });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'unknown error' }));
        alert('PDF failed: ' + err.error);
        return;
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename.replace(/\.md$/, '.pdf');
      a.click();
      URL.revokeObjectURL(url);
    } catch (e) {
      alert('PDF failed: ' + e.message);
    } finally {
      btn.textContent = original;
      btn.classList.remove('loading');
    }
  }

  async function loadReports(slug) {
    reportsList.innerHTML = '<span class="no-reports">Loading…</span>';
    activeReportFile = null;
    exportPdfBtn.style.display = 'none';
    if (!slug) {
      reportsList.innerHTML = '<span class="no-reports">Select a client</span>';
      reportsPanel.classList.add('hidden');
      toggleReportsBtn.classList.remove('active');
      return;
    }
    const reports = await fetch(`/api/clients/${slug}/reports`).then(r => r.json()).catch(() => []);
    if (!reports.length) {
      reportsList.innerHTML = '<span class="no-reports">No reports yet</span>';
      reportsPanel.classList.add('hidden');
      toggleReportsBtn.classList.remove('active');
      return;
    }
    reportsPanel.classList.remove('hidden');
    toggleReportsBtn.classList.add('active');
    reportsList.innerHTML = reports.map(r => {
      const label = r.filename.replace(/^\d+-/, '').replace(/-\d{4}-\d{2}-\d{2}\.md$/, '').replace(/-/g, ' ');
      const date = (r.filename.match(/(\d{4}-\d{2}-\d{2})/) || [])[1] || '';
      const meta = [r.score ? `${r.score}` : '', date].filter(Boolean).join(' · ');
      return `<div class="report-item-row">
        <button class="report-item" data-file="${r.filename}" title="${r.filename}">
          <div class="report-name">${label}</div>
          ${meta ? `<div class="report-meta">${meta}</div>` : ''}
        </button>
        <button class="pdf-btn" data-file="${r.filename}" title="Export as PDF">PDF</button>
      </div>`;
    }).join('');

    reportsList.querySelectorAll('.report-item').forEach(btn => {
      btn.addEventListener('click', async () => {
        reportsList.querySelectorAll('.report-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const slug = clientSelect.value;
        const file = btn.dataset.file;
        activeReportFile = file;
        exportPdfBtn.style.display = '';
        const text = await fetch(`/api/clients/${slug}/reports/${file}`).then(r => r.text());
        output.innerHTML = renderMarkdown(text);
        pill.textContent = 'report';
        pill.className = 'pill done';
      });
    });

    reportsList.querySelectorAll('.pdf-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        downloadReportPdf(clientSelect.value, btn.dataset.file, btn);
      });
    });
  }

  exportPdfBtn.addEventListener('click', () => {
    if (!activeReportFile || !clientSelect.value) return;
    downloadReportPdf(clientSelect.value, activeReportFile, exportPdfBtn);
  });

  // Delete client
  deleteBtn.addEventListener('click', async () => {
    if (!currentClient) return;
    if (!confirm(`Delete client "${currentClient.name}"? This cannot be undone.`)) return;
    const res = await fetch('/api/clients/' + currentClient.slug, { method: 'DELETE' });
    if (!res.ok) { alert('Failed to delete.'); return; }
    await loadClients();
  });

  // Health check + init
  fetch('/api/health').then(r => r.json()).then(d => {
    document.getElementById('health-dot').className = 'dot ' + (d.ok ? 'ok' : 'warn');
  }).catch(() => {});
  loadClients();

  // New client modal
  const ncModal = document.getElementById('new-client-modal');
  document.getElementById('new-client-btn').addEventListener('click', () => {
    document.getElementById('nc-name').value = '';
    document.getElementById('nc-cv').value = '';
    document.getElementById('nc-profile').value = '';
    ncModal.classList.add('open');
  });
  document.getElementById('nc-cancel').addEventListener('click', () => ncModal.classList.remove('open'));
  ncModal.addEventListener('click', (e) => { if (e.target === ncModal) ncModal.classList.remove('open'); });
  document.getElementById('nc-save').addEventListener('click', async () => {
    const name = document.getElementById('nc-name').value.trim();
    const cv = document.getElementById('nc-cv').value.trim();
    const profile = document.getElementById('nc-profile').value.trim();
    if (!name || !cv) { alert('Name and CV are required.'); return; }
    const res = await fetch('/api/clients', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, cv, profile }),
    });
    if (!res.ok) { alert('Failed to create client.'); return; }
    const { slug } = await res.json();
    ncModal.classList.remove('open');
    await loadClients(slug);
  });

  // Tab switching
  let currentMode = 'evaluate';
  document.querySelectorAll('.segmented button').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.segmented button').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentMode = tab.dataset.mode;
      ['evaluate', 'compare', 'interview'].forEach(m => {
        document.getElementById('fields-' + m).style.display = m === currentMode ? 'flex' : 'none';
      });
    });
  });

  // Markdown renderer
  function renderMarkdown(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^---+$/gm, '<hr>')
      .replace(/^\|(.+)\|$/gm, (_, row) => {
        const cells = row.split('|').map(c => c.trim());
        return '<tr>' + cells.map(c => /^[-:]+$/.test(c) ? '' : `<td>${c}</td>`).join('') + '</tr>';
      })
      .replace(/(<tr>.*<\/tr>\n?)+/gs, m => `<table>${m}</table>`)
      .replace(/<\/td><\/tr>\n<tr><td>/g, '</td></tr><tr><td>');
  }

  // Run
  const runBtn = document.getElementById('run-btn');
  const output = document.getElementById('output');
  const pill = document.getElementById('status-pill');

  runBtn.addEventListener('click', async () => {
    let body = { mode: currentMode };
    if (clientSelect.value) body.clientId = clientSelect.value;

    if (currentMode === 'evaluate') {
      body.cv = document.getElementById('cv-input').value.trim();
      body.jd = document.getElementById('jd-input').value.trim();
      body.company = document.getElementById('company-eval').value.trim();
    } else if (currentMode === 'compare') {
      body.cv = document.getElementById('cv-compare').value.trim();
      body.jd = document.getElementById('jds-compare').value.trim();
    } else {
      body.cv = document.getElementById('cv-interview').value.trim();
      body.company = document.getElementById('company-input').value.trim();
      body.role = document.getElementById('role-input').value.trim();
      body.jd = document.getElementById('jd-interview').value.trim();
    }

    if (!body.cv) { alert('Please paste a CV (or select a client).'); return; }

    runBtn.disabled = true;
    pill.textContent = 'running';
    pill.className = 'pill running';
    output.innerHTML = '';

    let raw = '';

    try {
      const res = await fetch('/api/evaluate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const parts = buf.split('\n\n');
        buf = parts.pop();

        for (const part of parts) {
          if (!part.startsWith('data: ')) continue;
          const { type, data } = JSON.parse(part.slice(6));
          if (type === 'text') {
            raw += data;
            output.innerHTML = renderMarkdown(raw);
            output.scrollTop = output.scrollHeight;
            if (currentMode === 'evaluate') {
              const companyField = document.getElementById('company-eval');
              if (!companyField.value) {
                const m = raw.match(/\*\*Company:\*\*\s*([^\n*]+)/);
                if (m) companyField.value = m[1].trim();
              }
            }
          } else if (type === 'status') {
            if (!raw) output.innerHTML = `<span class="placeholder">${data}</span>`;
          } else if (type === 'error') {
            pill.textContent = 'error';
            pill.className = 'pill error';
            output.innerHTML += `<br><span style="color:var(--red)">Error: ${data}</span>`;
          } else if (type === 'saved') {
            output.innerHTML += `<br><span style="color:var(--green)">Saved → ${data}</span>`;
            if (clientSelect.value) loadReports(clientSelect.value);
          } else if (type === 'done') {
            pill.textContent = 'done';
            pill.className = 'pill done';
          }
        }
      }
    } catch (e) {
      pill.textContent = 'error';
      pill.className = 'pill error';
      output.innerHTML = `<span style="color:var(--red)">Connection error: ${e.message}</span>`;
    }

    runBtn.disabled = false;
  });

  // Toggle reports panel
  toggleReportsBtn.addEventListener('click', () => {
    reportsPanel.classList.toggle('hidden');
    toggleReportsBtn.classList.toggle('active', !reportsPanel.classList.contains('hidden'));
  });

  // Copy
  document.getElementById('copy-btn').addEventListener('click', () => {
    const text = output.innerText;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  });
</script>

</body>
</html>
