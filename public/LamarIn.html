// ─── Hooks ───────────────────────────────────────────────────────────────────
function useResponsive(breakpoint = 768) {
  const [mobile, setMobile] = useState(() => window.innerWidth < breakpoint);
  useEffect(() => {
    const fn = () => setMobile(window.innerWidth < breakpoint);
    window.addEventListener('resize', fn, { passive: true });
    return () => window.removeEventListener('resize', fn);
  }, [breakpoint]);
  return mobile;
}

      <div style={{ width:size, height:size, borderRadius:size*.28, background:C.primary, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>

    </div>
  );
}

function Badge({ tone='ink', children, style:s }) {

}

  return (
